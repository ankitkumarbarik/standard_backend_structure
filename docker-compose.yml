services:
  postgresdb:
    image: postgres:17
    container_name: postgresbox
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend4
    volumes: 
      - 'postgres_data:/var/lib/postgresql/data'

volumes:
  postgres_data:
